on:
  workflow_dispatch:

jobs:
  clone_shared_workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main repo
        uses: actions/checkout@v4

      - name: Check out actions from private repo
        uses: actions/checkout@v4
        with:
          repository: Telefonica/android-shared-workflows
          ref: 'feature/ANDROID-15237-UpdateBaselineShared'
          token: "${{ secrets.NOVUM_PRIVATE_REPOS }}"
          path: .github/android-shared-workflows

      - name: Upload shared workflows as artifact
        uses: actions/upload-artifact@v3
        with:
          name: shared-workflows
          path: .github/android-shared-workflows

  use_shared_workflow:
    needs: clone_shared_workflows
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download shared workflows artifact
        uses: actions/download-artifact@v3
        with:
          name: shared-workflows
          path: .github/android-shared-workflows

      - name: "Update screenshot baseline"
        uses: ./.github/android-shared-workflows/update-baseline.yaml
        with:
          baseline-update-tasks: 'recordRoborazziDebug'
          emulators-number: 0
          baseline-file-path: './**/screenshots/*'
          commit-message: 'Updated screenshots baseline'